{% extends "base.html" %}

{% block title %}Modifier mon email - SmartCaisse{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h1 class="h3 mb-4">
            <i class="bi bi-pencil me-2"></i>Modifier mon email
        </h1>

        <div class="card border-0 shadow-sm">
            <div class="card-body">
                <form method="POST">
                    {{ csrf_token() }}

                    <div class="mb-3">
                        <label for="email" class="form-label">Nouvel email</label>
                        <input
                            type="email"
                            class="form-control"
                            id="email"
                            name="email"
                            value="{{ current_user.email }}"
                            required
                        >
                        <small class="text-muted">Votre email personnel</small>
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-between">
                        <a href="{{ url_for('profile.index') }}" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left me-2"></i>Annuler
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-circle me-2"></i>Valider
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
