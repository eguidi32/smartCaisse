{% extends "base.html" %}

{% block title %}Ajouter produit - SmartCaisse{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h1 class="mb-4"><i class="bi bi-plus-circle me-2"></i>Ajouter un produit</h1>

            <div class="card shadow-sm">
                <div class="card-body">
                    <form method="POST">
                        <div class="mb-3">
                            <label for="name" class="form-label">Nom du produit *</label>
                            <input type="text" class="form-control" id="name" name="name" required>
                            <small class="text-muted">Ex: Sucre, Farine, Huile...</small>
                        </div>

                        <div class="mb-3">
                            <label for="description" class="form-label">Description</label>
                            <textarea class="form-control" id="description" name="description" rows="3"></textarea>
                            <small class="text-muted">Détails optionnels du produit</small>
                        </div>

                        <div class="mb-3">
                            <label for="price" class="form-label">Prix unitaire (FCFA) *</label>
                            <input type="number" class="form-control" id="price" name="price" step="0.01" min="0" value="0" required>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle me-1"></i>Créer le produit
                            </button>
                            <a href="{{ url_for('inventory.list_products') }}" class="btn btn-outline-secondary">
                                <i class="bi bi-x-circle me-1"></i>Annuler
                            </a>
                        </div>
                    </form>
                </div>
            </div>

            <div class="alert alert-info mt-3">
                <i class="bi bi-info-circle me-2"></i>
                <strong>Conseil:</strong> Vous pourrez ajouter le stock initial après création du produit.
            </div>
        </div>
    </div>
</div>
{% endblock %}
