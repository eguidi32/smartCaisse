{% extends "base.html" %}

{% block title %}Éditer {{ product.name }} - SmartCaisse{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h1 class="mb-4"><i class="bi bi-pencil me-2"></i>Éditer: {{ product.name }}</h1>

            <div class="card shadow-sm">
                <div class="card-body">
                    <form method="POST">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                        <div class="mb-3">
                            <label for="name" class="form-label">Nom du produit *</label>
                            <input type="text" class="form-control" id="name" name="name" value="{{ product.name }}" required>
                        </div>

                        <div class="mb-3">
                            <label for="sku" class="form-label">Code SKU</label>
                            <input type="text" class="form-control" id="sku" name="sku" value="{{ product.sku or '' }}">
                        </div>

                        <div class="mb-3">
                            <label for="category_id" class="form-label">Catégorie</label>
                            <select class="form-select" id="category_id" name="category_id">
                                <option value="">-- Aucune --</option>
                                {% for cat in categories %}
                                <option value="{{ cat.id }}" {% if product.category_id == cat.id %}selected{% endif %}>
                                    {{ cat.name }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="description" class="form-label">Description</label>
                            <textarea class="form-control" id="description" name="description" rows="3">{{ product.description }}</textarea>
                        </div>

                        <div class="mb-3">
                            <label for="price" class="form-label">Prix unitaire (FCFA) *</label>
                            <input type="number" class="form-control" id="price" name="price" step="0.01" min="0" value="{{ product.price }}" required>
                        </div>

                        <div class="mb-3 p-3 bg-light rounded">
                            <strong>Stock actuel:</strong>
                            <span class="badge bg-info fs-6">{{ product.current_stock }} unités</span>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle me-1"></i>Enregistrer
                            </button>
                            <a href="{{ url_for('inventory.product_detail', id=product.id) }}" class="btn btn-outline-secondary">
                                <i class="bi bi-x-circle me-1"></i>Annuler
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
