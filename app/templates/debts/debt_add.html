{% extends "base.html" %}

{% block title %}Nouvelle dette - SmartCaisse{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="mb-4">
            <a href="{{ url_for('debts.client_detail', id=client.id) }}" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left me-2"></i>Retour
            </a>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="card-header bg-transparent">
                <h4 class="mb-0">
                    <i class="bi bi-plus-circle me-2"></i>Nouvelle dette
                </h4>
                <small class="text-muted">Pour : {{ client.nom }}</small>
            </div>
            <div class="card-body">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <div class="mb-3">
                        <label for="description" class="form-label fw-medium">
                            <i class="bi bi-card-text me-1"></i>Description *
                        </label>
                        <input type="text" class="form-control" id="description" name="description"
                               placeholder="Ex: Achat marchandises" required>
                    </div>

                    <div class="mb-3">
                        <label for="montant" class="form-label fw-medium">
                            <i class="bi bi-cash me-1"></i>Montant (FCFA) *
                        </label>
                        <input type="number" class="form-control form-control-lg" id="montant" name="montant"
                               placeholder="0" min="1" step="1" required>
                    </div>

                    <div class="mb-4">
                        <label for="date" class="form-label fw-medium">
                            <i class="bi bi-calendar me-1"></i>Date
                        </label>
                        <input type="date" class="form-control" id="date" name="date"
                               value="{{ today }}" required>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="bi bi-check-circle me-2"></i>Enregistrer la dette
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
