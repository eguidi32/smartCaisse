{% extends "base.html" %}

{% block title %}Email confirmé - SmartCaisse{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm">
            <div class="card-body text-center py-5">
                <div style="font-size: 4rem; color: #28a745; margin-bottom: 20px;">
                    <i class="bi bi-check-circle"></i>
                </div>
                <h3 class="mt-2">Email confirmé !</h3>
                <p class="text-muted">
                    Merci {{ client.nom }}. Vous recevrez maintenant les notifications de vos dettes par email.
                </p>
                <p class="small text-muted mt-4">
                    <i class="bi bi-envelope-check me-1"></i>
                    Vous pouvez fermer cette page.
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
