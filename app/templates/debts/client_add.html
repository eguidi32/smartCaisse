{% extends "base.html" %}

{% block title %}Nouveau client - SmartCaisse{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="mb-4">
            <a href="{{ url_for('debts.list_clients') }}" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left me-2"></i>Retour
            </a>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="card-header bg-transparent">
                <h4 class="mb-0">
                    <i class="bi bi-person-plus me-2"></i>Nouveau client
                </h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <div class="mb-3">
                        <label for="nom" class="form-label fw-medium">
                            <i class="bi bi-person me-1"></i>Nom complet *
                        </label>
                        <input type="text" class="form-control" id="nom" name="nom"
                               placeholder="Ex: Jean Dupont" required>
                    </div>

                    <div class="mb-3">
                        <label for="telephone" class="form-label fw-medium">
                            <i class="bi bi-telephone me-1"></i>Téléphone *
                        </label>
                        <input type="text" class="form-control" id="telephone" name="telephone"
                               placeholder="Ex: 77 123 45 67" required>
                    </div>

                    <div class="mb-4">
                        <label for="adresse" class="form-label fw-medium">
                            <i class="bi bi-geo-alt me-1"></i>Adresse
                        </label>
                        <input type="text" class="form-control" id="adresse" name="adresse"
                               placeholder="Ex: Dakar, Médina">
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="bi bi-check-circle me-2"></i>Enregistrer
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
