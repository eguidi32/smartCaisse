{% extends "base.html" %}

{% block title %}Nouveau mot de passe - SmartCaisse{% endblock %}

{% block content %}
<div class="row justify-content-center" style="margin-top: 10vh;">
    <div class="col-md-5 col-lg-4">
        <div class="text-center mb-4">
            <h1 class="h3">
                <i class="bi bi-shield-lock text-success me-2"></i>Nouveau mot de passe
            </h1>
            <p class="text-muted">
                Créez un nouveau mot de passe pour votre compte.
            </p>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <div class="mb-3">
                        <label for="password" class="form-label fw-medium">
                            <i class="bi bi-lock me-1"></i>Nouveau mot de passe
                        </label>
                        <input type="password" class="form-control form-control-lg" id="password"
                               name="password" placeholder="Minimum 6 caractères"
                               required minlength="6" autofocus>
                    </div>

                    <div class="mb-4">
                        <label for="confirm_password" class="form-label fw-medium">
                            <i class="bi bi-lock-fill me-1"></i>Confirmer le mot de passe
                        </label>
                        <input type="password" class="form-control form-control-lg" id="confirm_password"
                               name="confirm_password" placeholder="Confirmez votre mot de passe"
                               required minlength="6">
                    </div>

                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-success btn-lg">
                            <i class="bi bi-check-circle me-2"></i>Réinitialiser
                        </button>
                    </div>

                    <div class="text-center">
                        <a href="{{ url_for('auth.login') }}" class="text-decoration-none">
                            <i class="bi bi-arrow-left me-1"></i>Retour à la connexion
                        </a>
                    </div>
                </form>
            </div>
        </div>

        <div class="text-center mt-4">
            <small class="text-muted">
                <i class="bi bi-shield-check me-1"></i>
                Choisissez un mot de passe sécurisé d'au moins 6 caractères.
            </small>
        </div>
    </div>
</div>
{% endblock %}
