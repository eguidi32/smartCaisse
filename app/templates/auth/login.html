{% extends "base.html" %}

{% block title %}Connexion - SmartCaisse{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <i class="bi bi-cash-stack text-primary" style="font-size: 3rem;"></i>
                    <h2 class="mt-2">Connexion</h2>
                    <p class="text-muted">Accédez à votre espace SmartCaisse</p>
                </div>

                <form method="POST" action="{{ url_for('auth.login') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label for="email" class="form-label">
                            <i class="bi bi-envelope me-1"></i>Email
                        </label>
                        <input type="email" class="form-control" id="email" name="email"
                               placeholder="votre@email.com" required>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">
                            <i class="bi bi-lock me-1"></i>Mot de passe
                        </label>
                        <input type="password" class="form-control" id="password" name="password"
                               placeholder="Votre mot de passe" required>
                        <div class="text-end mt-1">
                            <a href="{{ url_for('auth.forgot_password') }}" class="small text-decoration-none">
                                <i class="bi bi-key me-1"></i>Mot de passe oublié ?
                            </a>
                        </div>
                    </div>

                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="remember" name="remember">
                        <label class="form-check-label" for="remember">Se souvenir de moi</label>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 mb-3">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Se connecter
                    </button>
                </form>

                <hr>

                <p class="text-center text-muted small mb-0">
                    <i class="bi bi-info-circle me-1"></i>
                    Contactez un administrateur pour créer un compte.
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
